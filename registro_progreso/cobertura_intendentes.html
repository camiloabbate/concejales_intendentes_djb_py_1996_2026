* { box-sizing: border-box; margin: 0; padding: 0; }

td { padding: 3px 8px; border-bottom: 1px solid #eee; }

.cell { width: 64px; text-align: center; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; cursor: default; }
.badge-B { background: #d4edda; color: #1a6b3a; }
.badge-I { background: #fff3cd; color: #8a5a00; }
.badge-F { background: #d1ecf1; color: #0a5068; }

.badge-null { background: transparent; color: #ddd; font-size: 10px; }

.section-head td.distrito-col { background: #555 !important; }
</style>

;

const YEARS = [96, 1, 6, 10, 15, 21];
const YEAR_LABELS = {96:'1996',1:'2001',6:'2006',10:'2010',15:'2015',21:'2021'};
const YK = {96:'96',1:'01',6:'06',10:'10',15:'15',21:'21'};

function statusLabel(s) {
  if (s === 'B') return '<span class="badge badge-B" title="Entrada + salida">E+S</span>';
  if (s === 'I') return '<span class="badge badge-I" title="Solo entrada">Ent.</span>';
  if (s === 'F') return '<span class="badge badge-F" title="Solo salida">Sal.</span>';
  if (s === 'N') return '<span class="badge badge-N" title="Sin DJB">—</span>';
  return '<span class="badge badge-null">·</span>';
}

function hasAny(row) {
  return YEARS.some(y => row['s'+YK[y]] && row['s'+YK[y]] !== 'N');
}

const depts = [...new Set(RAW.map(r=>r.dept))].sort();
const sel = document.getElementById('deptFilter');
depts.forEach(d => { const o=document.createElement('option'); o.value=d; o.textContent=d; sel.appendChild(o); });

const tt = document.getElementById('tt');
document.addEventListener('mousemove', e => { tt.style.left=(e.clientX+14)+'px'; tt.style.top=(e.clientY-8)+'px'; });

function render() {
  const dept = document.getElementById('deptFilter').value;
  const search = document.getElementById('search').value.toLowerCase();
  const sf = document.getElementById('statusFilter').value;

  let filtered = RAW.filter(r => {
    if (dept && r.dept !== dept) return false;
    if (search && !r.d.includes(search)) return false;
    if (sf === 'hasDJB' && !hasAny(r)) return false;
    if (sf === 'B' && !YEARS.some(y => r['s'+YK[y]] === 'B')) return false;
    if (sf === 'I' && !YEARS.some(y => r['s'+YK[y]] === 'I')) return false;
    if (sf === 'F' && !YEARS.some(y => r['s'+YK[y]] === 'F')) return false;
    if (sf === 'N' && !YEARS.some(y => r['s'+YK[y]] === 'N')) return false;
    return true;
  });

  filtered.sort((a,b) => a.dept.localeCompare(b.dept) || a.d.localeCompare(b.d));

  document.getElementById('s-total').textContent = filtered.length;
  document.getElementById('s-any').textContent = filtered.filter(hasAny).length;
  document.getElementById('s-both').textContent = filtered.filter(r=>YEARS.some(y=>r['s'+YK[y]]==='B')).length;

  let html = '';
  let curDept = null;
  filtered.forEach(r => {
    if (r.dept !== curDept) {
      curDept = r.dept;
      html += `<tr class="section-head"><td class="distrito-col">${r.dept}</td><td colspan="7"></td></tr>`;
    }
    html += '<tr>';
    html += `<td class="distrito-col">${r.d}</td>`;
    html += `<td class="dept-col" style="display:none">${r.dept}</td>`;
    YEARS.forEach(y => {
      const s = r['s'+YK[y]];
      const nm = r['n'+YK[y]];
      const tipText = nm ? `${YEAR_LABELS[y]}: ${nm}` : `${YEAR_LABELS[y]}: sin datos`;
      html += `<td class="cell"><span onmouseenter="showTip(event,'${tipText.replace(/'/g,"&#39;")}')" onmouseleave="hideTip()">${statusLabel(s)}</span></td>`;
    });
    html += '</tr>';
  });
  document.getElementById('tbody').innerHTML = html;
}

function showTip(e, text) { tt.textContent = text; tt.style.display='block'; }
function hideTip() { tt.style.display='none'; }

document.getElementById('deptFilter').addEventListener('change', render);
document.getElementById('search').addEventListener('input', render);
document.getElementById('statusFilter').addEventListener('change', render);

render();
</script>
